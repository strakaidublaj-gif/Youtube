<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>👀</title>
<style>
  body{margin:0;background:black;color:white;font-family:monospace;overflow:hidden}
  #center{
    position:fixed; inset:0; display:flex;
    align-items:center; justify-content:center;
    flex-direction:column; text-align:center;
  }
  #emoji{font-size:120px; line-height:1}
  #text{font-size:28px; margin-top:10px}
</style>
</head>
<body>

<div id="center">
  <div id="emoji"></div>
  <div id="text"></div>
</div>

<script>
// URL'den isim al
const p = new URLSearchParams(location.search);
const isim = p.get("isim") || "Sen";

// İlk açılışta göster
const emoji = document.getElementById("emoji");
const text  = document.getElementById("text");

function showMiddle(){
  emoji.innerText = "🖕";
  text.innerText  = isim + " şaka yakalandın 😄";
}

// 0.5 sn sonra ortaya çıksın
setTimeout(showMiddle, 500);

// İstersen arka planda eski yağmur da kalsın:
function rain(){
  const d = document.createElement("div");
  d.innerText = isim + " seni seviyorum";
  d.style.position="absolute";
  d.style.left = Math.random()*innerWidth+"px";
  d.style.top="0px";
  d.style.opacity=0.6;
  document.body.appendChild(d);
  let y=0, v=Math.random()*4+2;
  const t=setInterval(()=>{
    y+=v; d.style.top=y+"px";
    if(y>innerHeight){ d.remove(); clearInterval(t); }
  },30);
}
setInterval(rain, 150);
</script>

</body>
</html>
