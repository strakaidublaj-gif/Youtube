<!DOCTYPE html>
<html>
<head>
  <title>Seni Seviyorum</title>
</head>

<body style="background:black; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:Arial;">

<div id="container" style="text-align:center;"></div>

<script>
const params = new URLSearchParams(window.location.search);
const isim = params.get("isim") || "Sen";

const container = document.getElementById("container");

// kaç tane yazı çıkacak (burayı artırırsan daha fazla olur)
for (let i = 1; i <= 200; i++) {
  const p = document.createElement("p");
  p.innerText = i + " - " + isim + " seni seviyorum";
  container.appendChild(p);
}
</script>

</body>
</html>
